<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Главная | Мой блог на Django</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'post_list' %}">📝 Мой блог</a>
            <div class="ms-auto">
                <a href="{% url 'post_create' %}" class="btn btn-success me-2">➕ Новый пост</a>
                <a href="{% url 'category_list' %}" class="btn btn-info">🏷️ Категории</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-12">
                <h1 class="mb-4">Все посты</h1>
            </div>
        </div>

        <div class="row">
            {% for post in posts %}
            <div class="col-md-4">
                <div class="card mb-4 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">
                            <a href="{% url 'post_detail' post.pk %}" class="text-decoration-none">{{ post.title }}</a>
                        </h5>
                        <p class="card-text">{{ post.content|truncatewords:20 }}</p>
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                {% if post.category %}
                                <span class="badge bg-secondary">{{ post.category.name }}</span>
                                {% endif %}
                            </div>
                            <small class="text-muted">{{ post.created_at|date:"d.m.Y" }}</small>
                        </div>
                        <div class="mt-3">
                            <a href="{% url 'post_update' post.pk %}" class="btn btn-sm btn-warning">✏️</a>
                            <a href="{% url 'post_delete' post.pk %}" class="btn btn-sm btn-danger">🗑️</a>
                        </div>
                    </div>
                </div>
            </div>
            {% empty %}
            <div class="col-12">
                <div class="alert alert-info">
                    Постов пока нет. <a href="{% url 'post_create' %}">Создайте первый пост!</a>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
