<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Добавить пост</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'index' %}">📝 Мой блог</a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-8 offset-md-2">
                <div class="card">
                    <div class="card-header">
                        <h2>➕ Добавить новый пост</h2>
                    </div>
                    <div class="card-body">
                        <form method="post">
                            {% csrf_token %}
                            
                            <div class="mb-3">
                                <label for="{{ form.title.id_for_label }}" class="form-label">Заголовок</label>
                                {{ form.title }}
                            </div>
                            
                            <div class="mb-3">
                                <label for="{{ form.content.id_for_label }}" class="form-label">Содержание</label>
                                {{ form.content }}
                            </div>
                            
                            <div class="mb-3">
                                <label for="{{ form.category.id_for_label }}" class="form-label">Категория</label>
                                {{ form.category }}
                            </div>
                            
                            <button type="submit" class="btn btn-primary">💾 Сохранить</button>
                            <a href="{% url 'index' %}" class="btn btn-secondary">Отмена</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
