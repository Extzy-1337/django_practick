<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Главная | Мой блог на Django</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card {
            transition: transform 0.2s;
            margin-bottom: 20px;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .card-title a {
            text-decoration: none;
            color: #333;
        }
        .card-title a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'index' %}">📝 Мой блог</a>
            <div class="ms-auto">
                <a href="{% url 'add_post' %}" class="btn btn-success">➕ Новый пост</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-12">
                <h1 class="mb-4">Все посты</h1>
            </div>
        </div>

        <div class="row">
            {% for post in posts %}
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">
                            <a href="{% url 'post_detail' post.pk %}">{{ post.title }}</a>
                        </h5>
                        <p class="card-text">{{ post.content|truncatewords:20 }}</p>
                        {% if post.category %}
                        <span class="badge bg-secondary">{{ post.category.name }}</span>
                        {% endif %}
                        <p class="text-muted mt-2 small">{{ post.created_at|date:"d.m.Y H:i" }}</p>
                        <div class="mt-2">
                            <a href="{% url 'edit_post' post.pk %}" class="btn btn-sm btn-warning">✏️</a>
                            <a href="{% url 'delete_post' post.pk %}" class="btn btn-sm btn-danger">🗑️</a>
                        </div>
                    </div>
                </div>
            </div>
            {% empty %}
            <div class="col-12">
                <div class="alert alert-info">
                    Постов пока нет. 
                    <a href="{% url 'add_post' %}">Создайте первый пост!</a>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
