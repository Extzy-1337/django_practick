<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Удалить категорию | Мой блог</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'post_list' %}">📝 Мой блог</a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-6 offset-md-3">
                <div class="card border-danger">
                    <div class="card-header bg-danger text-white">
                        <h3>⚠️ Удаление категории</h3>
                    </div>
                    <div class="card-body">
                        <p>Вы действительно хотите удалить категорию:</p>
                        <h4 class="text-danger">"{{ category.name }}"</h4>
                        <p class="text-warning">Внимание! Посты этой категории останутся без категории.</p>
                        <form method="post">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-danger">Да, удалить</button>
                            <a href="{% url 'category_list' %}" class="btn btn-secondary">Отмена</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
