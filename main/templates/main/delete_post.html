<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Удалить пост</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'index' %}">📝 Мой блог</a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-6 offset-md-3">
                <div class="card border-danger">
                    <div class="card-header bg-danger text-white">
                        <h2>⚠️ Подтверждение удаления</h2>
                    </div>
                    <div class="card-body">
                        <p class="fs-5">Вы действительно хотите удалить пост:</p>
                        <h3 class="text-danger">"{{ post.title }}"</h3>
                        <hr>
                        <form method="post">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-danger">🗑️ Да, удалить</button>
                            <a href="{% url 'post_detail' post.pk %}" class="btn btn-secondary">Отмена</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
