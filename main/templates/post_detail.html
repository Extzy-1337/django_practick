<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ post.title }} | Мой блог</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'index' %}">📝 Мой блог</a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-8 offset-md-2">
                <div class="card">
                    <div class="card-body">
                        <h1 class="card-title">{{ post.title }}</h1>
                        
                        <div class="mb-3">
                            {% if post.category %}
                            <span class="badge bg-secondary">{{ post.category.name }}</span>
                            {% endif %}
                            <span class="text-muted ms-2">{{ post.created_at|date:"d.m.Y H:i" }}</span>
                        </div>
                        
                        <hr>
                        
                        <div class="card-text">
                            {{ post.content|linebreaks }}
                        </div>
                        
                        <hr>
                        
                        <div class="mt-3">
                            <a href="{% url 'edit_post' post.pk %}" class="btn btn-warning">✏️ Редактировать</a>
                            <a href="{% url 'delete_post' post.pk %}" class="btn btn-danger">🗑️ Удалить</a>
                            <a href="{% url 'index' %}" class="btn btn-secondary">← На главную</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
